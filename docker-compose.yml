services:
  # 1. Database for Auth Service (User Data)
  auth-db:
    image: postgres:15
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432" # Accessed via localhost:5432
    restart: always

  # 2. Database for Movie Service (Movies/Screenings)
  movie-db:
    image: postgres:15
    container_name: movie-db
    environment:
      POSTGRES_DB: movie_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432" # Accessed via localhost:5433
    restart: always

  # 3. Database for Booking Service (Tickets)
  booking-db:
    image: postgres:15
    container_name: booking-db
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432" # Accessed via localhost:5434
    restart: always

  # Optional: PGAdmin (Web Interface to view your DBs)
  # Access at http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - auth-db
      - movie-db
      - booking-db